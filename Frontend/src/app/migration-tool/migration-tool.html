<div class="wizard-container">

  <div class="card" *ngIf="currentStep === 1">
    <h2>Choose Source CRM</h2>
    <div class="crm-grid">
      <div class="crm-option" (click)="onCRMSelect('zoho')">
        <input type="radio" name="crm" value="zoho">
        <span>Zoho CRM</span>
      </div>
      <div class="crm-option" (click)="onCRMSelect('Microsoft Dynamics 365')">
        <input type="radio" name="crm" value="Microsoft Dynamics 365">
        <span>Microsoft Dynamics 365</span>
      </div>
    </div>
  </div>

  <div class="card" *ngIf="currentStep === 2">
    <h2>Configure {{ selectedCRM | titlecase }} Migration</h2>

    <label>1. Upload CSV</label>
    <input type="file" (change)="onFileSelected($event)" accept=".csv">

    <label>2. Destination Salesforce Object</label>
    <select [(ngModel)]="selectedObject" (change)="onObjectSelect()">
      <option value="" disabled>-- Select Object --</option>
      <option *ngFor="let obj of sfObjects" [value]="obj.name">{{ obj.label }}</option>
    </select>

    <div class="actions">
      <button (click)="currentStep = 1">Back</button>
      <button (click)="goToMapping()" [disabled]="!selectedFile || !selectedObject">Next: Mapping</button>
    </div>
  </div>

  <div class="card" *ngIf="currentStep === 3">
    <h2>Field Mapping</h2>
    <table>
      <thead>
        <tr><th>{{ selectedCRM }} Column</th><th>Salesforce Field</th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let map of mappings">
          <td>{{ map.zohoField }}</td>
          <td>
            <select [(ngModel)]="map.sfField">
              <option value="">-- Ignore --</option>
              <option *ngFor="let field of sfFields" [value]="field.name">{{ field.label }}</option>
            </select>
          </td>
        </tr>
      </tbody>
    </table>
    <div class="actions">
      <button (click)="currentStep = 2">Back</button>
      <button (click)="startMigration()" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Migrating...' : 'Start Push' }}
      </button>
    </div>
  </div>

  <div class="card" *ngIf="currentStep === 4">
    <h2>Migration Results</h2>
    <p>Records Processed: {{ migrationResults?.length }}</p>
    <button (click)="currentStep = 1">Start New Migration</button>
  </div>
</div>
