<div class="auth-main">
  <div class="auth-wrapper v3">
    <div class="auth-form">
      <div class="card my-5">
        <div class="card-body">
          <form (ngSubmit)="onSubmit($event)">
            <a href="#" class="d-flex justify-content-center">
              <img src="assets/images/gemini-svg.svg" alt="logo" />
            </a>
            <div class="row">
              <div class="d-flex justify-content-center">
                <div class="auth-header text-center">
                  <h2 class="text-secondary mt-5"><b>Welcome</b></h2>
                  <p class="fs-4 mt-2">Connect your Salesforce Org to begin migration</p>
                </div>
              </div>
            </div>
            <div class="form-floating mb-3">
              <select class="form-select" id="salesforceEnvironment" aria-label="Salesforce Environment"
                [(ngModel)]="selectedEnvironment"
                name="environment">
                <option value="production">Production / Developer</option>
                <option value="sandbox">Sandbox</option>
              </select>
              <label for="salesforceEnvironment">Salesforce Environment</label>
            </div>

            @if (error()) {
              <div class="alert alert-danger" role="alert">
                {{ error() }}
              </div>
            }

            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-primary btn-lg" [disabled]="loading()">
                @if (loading()) {
                  Connecting...
                } @else {
                  <i class="ti ti-brand-salesforce me-2"></i> Log in with Salesforce
                }
              </button>
            </div>

            <p class="text-muted text-center mt-3 fs-6">
              You will be redirected to Salesforce to sign in securely.
            </p>
            <hr />
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
